<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Stackly</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    :root { --purple:#2563eb; --purple2:#60a5fa; --white:#0f172a; --muted:#64748b; --border:rgba(0,0,0,0.1); --body:'Inter',sans-serif; --display:'Bebas Neue',sans-serif; --mono:'DM Mono',monospace; }
    html,body { height:100%; }
    body { font-family:var(--body); background:linear-gradient(135deg, #f8fafc 0%, #eff6ff 50%, #dbeafe 100%); color:var(--white); display:flex; flex-direction:column; }
    a { text-decoration:none; color:inherit; }
    
    .navbar { padding:1.2rem 4%; display:flex; align-items:center; justify-content:space-between; position:absolute; top:0; width:100%; }
    .logo-wordmark { font-family:var(--display); font-size:26px; letter-spacing:3px; color:var(--white); display:flex; align-items:center; gap:10px; }
    .logo-icon { width:36px; height:36px; background:linear-gradient(135deg,var(--purple),var(--purple2)); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px; color:#fff; }
    
    .error-container { flex:1; display:flex; align-items:center; justify-content:center; padding:20px; text-align:center; position:relative; z-index:1; }
    .error-content { max-width:500px; }
    .error-code { font-family:var(--display); font-size:clamp(120px, 15vw, 180px); line-height:.8; background:linear-gradient(135deg,var(--purple),var(--purple2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:20px; letter-spacing:2px; }
    .error-title { font-size:24px; font-weight:700; margin-bottom:12px; }
    .error-desc { color:var(--muted); font-size:15px; line-height:1.7; margin-bottom:36px; }
    
    .btn-primary { background:var(--purple); color:#fff; padding:14px 32px; border-radius:8px; font-size:14px; font-weight:600; transition:background .3s,transform .2s; display:inline-flex; align-items:center; gap:8px; box-shadow:0 8px 20px rgba(37,99,235,.2); }
    .btn-primary:hover { background:#1d4ed8; transform:translateY(-2px); }
    
    /* BACKGROUND DNA EFFECT */
    .bg-shape { position:absolute; border-radius:50%; z-index:0; filter:blur(60px); opacity:0.6; }
    .bg-shape-1 { width:300px; height:300px; background:rgba(37,99,235,.15); top:20%; left:10%; }
    .bg-shape-2 { width:400px; height:400px; background:rgba(96,165,250,.1); bottom:10%; right:10%; }
    /* PRELOADER */
    #preloader { position:fixed; inset:0; background:#ffffff; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:99999; transition:opacity 0.7s ease; }
    .pl-logo { width:140px; margin-bottom:36px; animation:pl-pulse 2.5s ease-in-out infinite; }
    @keyframes pl-pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.8;transform:scale(0.97)} }
    .dna-helix { display:flex; gap:10px; align-items:center; height:60px; margin-bottom:28px; }
    .dna-helix span { width:10px; height:10px; border-radius:50%; display:block; }
    .dna-helix span:nth-child(odd)  { background:#2563eb; }
    .dna-helix span:nth-child(even) { background:#60a5fa; }
    .dna-helix span:nth-child(1){animation:dna-up   1.6s ease-in-out 0.00s infinite}
    .dna-helix span:nth-child(2){animation:dna-down 1.6s ease-in-out 0.20s infinite}
    .dna-helix span:nth-child(3){animation:dna-up   1.6s ease-in-out 0.40s infinite}
    .dna-helix span:nth-child(4){animation:dna-down 1.6s ease-in-out 0.60s infinite}
    .dna-helix span:nth-child(5){animation:dna-up   1.6s ease-in-out 0.80s infinite}
    .dna-helix span:nth-child(6){animation:dna-down 1.6s ease-in-out 1.00s infinite}
    .dna-helix span:nth-child(7){animation:dna-up   1.6s ease-in-out 1.20s infinite}
    .dna-helix span:nth-child(8){animation:dna-down 1.6s ease-in-out 1.40s infinite}
    @keyframes dna-up   {0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(-22px);opacity:1}}
    @keyframes dna-down {0%,100%{transform:translateY(0);opacity:.45}50%{transform:translateY(22px);opacity:1}}
    .pl-label { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:5px; color:#94a3b8; text-transform:uppercase; margin-bottom:16px; animation:pl-blink 2s ease-in-out infinite; }
    @keyframes pl-blink {0%,100%{opacity:.35}50%{opacity:1}}
    .pl-track { width:180px; height:2px; background:rgba(37,99,235,0.12); border-radius:2px; overflow:hidden; }
    .pl-fill { height:100%; width:0%; background:linear-gradient(90deg,#2563eb,#60a5fa); border-radius:2px; animation:pl-load 2s cubic-bezier(.4,0,.2,1) forwards; }
    @keyframes pl-load {0%{width:0%}65%{width:75%}100%{width:100%}}
  </style>
</head>
<body>
<!-- PRELOADER -->
<div id="preloader">
  <img src="./images/logo.webp" class="pl-logo" alt="Stackly">
  <div class="dna-helix">
    <span></span><span></span><span></span><span></span>
    <span></span><span></span><span></span><span></span>
  </div>
  <p class="pl-label">STACKLY &middot; INITIALIZING</p>
  <div class="pl-track"><div class="pl-fill"></div></div>
</div>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>
  
  <nav class="navbar">
    <div class="nav__logo">
      <a href="index.html">
        <img src="./images/logo.webp" class="logo-img" alt="logo" style="width: 130px; height: auto;">
      </a>
    </div>
  </nav>

  <div class="error-container">
    <div class="error-content">
      <div class="error-code">404</div>
      <h2 class="error-title">Strand Not Found</h2>
      <p class="error-desc">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable in our biotechnology database.</p>
      <a href="index.html" class="btn-primary"><i class="ri-home-4-line"></i> Return to Homepage</a>
    </div>
  </div>
</body>
<script>
window.addEventListener("load", () => {
  const pl = document.getElementById("preloader");
  setTimeout(() => { pl.style.opacity = "0"; setTimeout(() => { pl.style.display = "none"; }, 700); }, 2200);
});
</script>
</html>
